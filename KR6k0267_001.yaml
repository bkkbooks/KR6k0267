二初犯初重二不犯二輕初以物燃火二以火投物五十八藏他衣物戒初戒名二戒緣三戒本注文為三初他物初相體悉二己物二恐損壞三難緣三為驚他五十九真淨施主不知輒取表戒六十著新衣戒初戒名二戒緣三戒本初立法初比丘二得新衣三須三壞色注文為二初釋作淨初即染為淨二已染揲淨二正戒本初犯人二釋點淨初輕二不以三色壞二重三結罪注文為二初犯初明正犯二明點淨三明寄俗舍二不犯六十一故殺畜生戒六十二飲蟲水戒初戒名二戒緣三戒本注文為二初明尼同犯二明不犯初前二無心二後二順教六十三疑惱比丘戒六十四覆藏比丘罪戒初戒名二戒緣三戒本覆藏注文為四初明結犯時分二覆餘罪三自覆四覆下衆六十五度減年受具戒初戒名二戒緣三戒本初立法二正本初人二知三與受結提注文為二初犯初僧初約問對明犯不犯初問答二尼二判犯二不犯二約作法明輕重初明和尚犯有重輕二明餘僧一向犯輕六十六發四諍六十七與賊期行戒六十八說欲不障道違僧諫戒六十九隨舉比丘戒初戒名二戒緣三戒本末段注文為二初尼同犯二不犯初開非意二室相不成三難緣初反前初二二反上第三三反上第四七十隨擯沙彌戒七十一拒勸學戒七十二毀毗尼戒初戒名二戒緣初敘六羣畏舉二明因毀制戒三戒本初人二明說戒時三明結罪相初正毀詞二出所以三結犯相七十三恐舉先言戒乃至八十五兜羅貯蓐戒八十六作骨牙角針筒戒初戒名二戒緣三戒本注文為二初犯二不犯初開體別二開作餘物八十七過量尼師壇戒乃至八十九過量雨衣戒九十過量三衣戒初戒名二戒緣初難陀相濫三戒本二六羣起過三結章門六四波羅提提舍尼法初標章門二釋章門三結章門七衆式叉迦羅尼法初標章門二釋章門初五十一戒敬僧初兩戒著衣齊整法二二十三戒入聚落受請法二八戒敬法三二十三戒示少欲知足有正法相三二十六戒敬佛四三戒制便利法三結章門四十五戒雜明敬三寶行八七滅諍法初標章門二釋章門初明四諍初總示二注釋初識名相二分品量三治滅法二列七藥初現前注文為二初敘緣二列相二憶念注文為二初緣起二制法初對衆檢勘三不癡注文為二初緣二與羯磨二相四自言治注文同上五多人語注文為三初敘緣二示制法六罪處所注文同上三示別名七草布地注文為二初敘緣起三結章門二示制法三廣教流通初牒名反束告知二舉教所出勸說流通二明略教行法初發起序二正宗初毗婆尸初法體偈初上半明忍行之益二下半示不忍之損二能說人初題名二舉號三結法屬人二尸棄初法體偈初上半約譬明離險二能說人二下半約世明遠惡三毗葉羅初法體偈初四句止行初半偈口無過二能說人二半偈作行二半偈身離過四拘樓孫初法體偈初一偈利他行初三句喻文二合喻二能說人二一偈自利行初不外違二唯內慎五拘那含初法體偈初上半明因行二能說人二下半明果滿六迦葉初法體偈初三句明行教初二句止惡修善二一句明當觀志意二能說人二一句指非濫說七釋迦初法體偈初一偈明三業行淨二明行成會正二能說人初明能說之人二明略教所為三明息略通廣三流通初簡人二勸學三廣略二教總流通初廣教勸信流通初正彰戒益初不期世報而冥感獲初標持人二舉世報誘鈍根初總標二別示三勸觀及持初勸觀二勸持二與慧相資道成遠益初明修因二三世同遵初引三世初別舉二顯證果二同遵行益二顯德二略教信順流通初明律主引略勸之文初召機二勸信二舉七佛說略行之度世初七佛說略初歎德二行之度世二演法三明七佛諸子奉教度世初遵師教二贊略法三付囑流通初將傳遺訓之儀三彰益初成因二正明付囑之法初遮疑二證果二示人法住持相似初指所說法三歎教功益初明住持益二令觀法如佛二明得道益四奉順流通初舉損初法說二舉喻二勸持初勸修自行初法二勸行衆法二喻五回向流通初結前廣略之文初結所說二教二集始末行功二明說戒之益初所施之境遍該法界二所期之益直至菩提乙亥六月二十九日録訖時居惠安淨峯寺弘一謹案弘一大師所編四分律含注戒本科及戒本疏略科見後原稿凡疏中科文前後別異者附注用朱記號記科別異者附注用黑記號注文之科用藍又戒本科文各段之末分別用朱朱及藍隔開戒本疏略科各段則但用朱隔開又戒本疏主要之科原以藍記之茲為便排印以代朱以代藍以黑雙線代朱以黑粗線代朱以黑細線代藍謹附識備考大藏經會謹識
