body:
  text: 弘一初名目初法題二人號二本文初廣略二教總序二廣略二教別序正流通正宗分三廣略二教總流通總舉兩教勸修弘益初歸敬三寶初能敬儀二所敬境二歸敬本意初明意初能弘之緣二所弘之教廣陳戒之體相二明益解演布益三廣陳體相初明戒德宗體初喻陳初明深廣無涯性不納穢喻列相勸持法說二明出生衆寶使求無厭喻二舉益勸聽初舉喻益勸護聖財列相顯示二明體不虛圓必假說聽之力二略舉篇聚初舉列廣教勸信修捨初廣教戒相滅惡之功明能說教人二舉功勸聽二引佛成證結說有由初列教主之名廣張隨行三顯己承傳勸受聽說二結人以成法三明持毀得失衆別之行初前兩寄別行以生喻初以戒為身足喻止持初約止犯之損初喻二約作持之益二法二以戒為車軸喻作犯初喻二合二後二寄衆法以生喻初舉教為明鏡喻初喻明教行攝持功不虛義二法合四戒經弘益初喻辭二舉教為神解喻初喻顯教功益二總法合修說之儀初總合上喻二法合二舉法屬人三說教之時初結前文注分為二二生後文二廣略二教別序正流通初正明廣教行法初廣教之端序二明略教行法二廣教正宗三廣教流通初集僧簡衆初能成衆法之緣初和合注文為二初制緣初緣起二和別二制意二僧集會注文為四初約界集二供具三獨住四結犯三明未受具戒注文為四初遮說戒二安置處三聽非人四制尼衆四明不來說欲注文為三初欲緣五明尼來請法二欲法六明問發三重病七答成法注文為六初出房二檢校三白告明單白知衆法四制誦二所成說廣之業五重誦六誦經初初二句敘告事情初警衆情二雙牒緣本告衆第二發起序二三四句忍同可否初心和事順理必承二誡敕時衆二單牒宗本勸速忍三後一句舉事成結注文為三初隨王結序勸持相二黑白三正述三覆檢問有無勸持之相三四人第二發起序二誡敕時衆初標舉說宗歎功勸信注文為四初制緣二解名三歎功初滅惡二生善三成定慧四歎發引初序分二正宗二顯形心無異注文為五初同集三流通二敷座三略說四外集告淨五指略三正明警敕有開解之用四省己之違見過尋悔注文為三初未懺二悔法五省己之順默表己淨三開白六誡勸時座深懷二答七明隱覆之瑕不實之損注文為三初明罪相二釋障道八知犯識懺克成道業三誡勸初明覆過初舉喻二結示二合法初對合二委釋初釋死尸二釋不受結序勸持相三正述三覆檢問有無勸持之相初結前生下問二正問衆中應後法三舉默表淨應說勸持二廣教正宗初四波羅夷法初標章門初告衆二示法三彰時四顯所據二釋章門初大淫戒初戒名二戒緣三結章門三戒本乃至八七滅諍法乃至四大妄語戒行益初明結戒相以顯行法初制戒緣起初明住處二能犯人三明犯相初犯相二明訶責相初明比丘初明訶辭初總舉二舉過達佛二別相五句如來訶辭三總結二明佛初親集僧問二佛訶相初總訶明舉過制戒二別訶二隨犯制廣明若依教等三明結戒益義初明此戒法生衆功德二明生別人滅惡成善初生善二滅惡二辨說教相以成教益三興建正法行三戒本初若比丘注文為三初標列釋由二共比丘二總列衆名三同戒三結定犯人四不還戒注文為二初敘佛開二明捨戒初雖捨不成五戒羸注文為二初明戒羸不捨相二對境彰成二明戒羸而捨相六不淨行注文為三初犯境二境差三限齊七共畜生注文為二初明所可行處二明成犯相初列趣境初列三趣二約趣明報二明自身造境初約覺境以明犯相二舉後三境以對覺境同成犯相三外難所逼怨逼初明怨捉將向前境二明怨捉就身行犯八是比丘夷初引人初釋罪名二依法科注文為二二成犯相九不共住初明成犯相初明比丘犯相初明自作教他成犯相初自作明輕重二教作明輕重二明四衆犯相二境想相對成犯相初明尸壞等二開犯法初前三別緣二就境想二後二通緣初本境二境差想二大盜戒初戒名二戒緣初明盜緣初遠緣二訶犯之相二所犯三戒本初能犯人二明盜物處初村處二靜處注文為二初釋靜處二別明諸處初十三種明物處差別二八種明物體差別三五種明契要差別三明其心業初明主不捨二明心應境注文為二三結罪分齊四為俗法訶初治罰初釋文二訶罵二立句初五種心二五種取五罪注文為二初犯初比丘二不犯二餘衆初自作教他初明自作初明成重二犯輕二明教他初心境相當二境想相對二不相當初心同物異二物同心異六擯三大殺戒初戒名二戒緣初修觀乖方初為說觀二明乖法初厭身二改觀數息初改觀二雇殺二修果三訶責三戒本初能犯過人二明是自業三所殺境界四明教他業初教殺二口業五將人附罪注文為二初犯初比丘六入治擯相二不犯二餘衆初犯相初當趣明輕相二境想二分異趣相四大妄語戒初戒名二戒緣三戒本初出能犯戒者二妄語境三正是犯過戒本初總舉注文為三初釋自稱四制疑網二釋人法五開心實二別示相三釋上人法六引人入法注文為二初犯初比丘初當趣七入治擯相二不犯二餘衆二異趣三結章門初告衆情初舉人歎德二正結章門二除疑執初釋同住疑二釋重犯疑三欲說後篇又靜衆初正問衆中應後法二舉默表淨應說勸持二十三僧伽婆尸沙法初標章門二釋章門初故出不淨戒三結章門乃至十三惡性拒僧違諫戒初戒名二戒緣三戒本初能犯人二明其過業注文為二初實心三開緣二前境四結罪名注文為二初犯初明方便二不犯二辨相教三對餘衆二觸女人戒初戒名二戒緣三戒本初犯人二染心三觸境四明過業五結罪注文為二初犯初比丘二餘衆二不犯初人女初二俱無衣初明比丘觸四女相二餘境二互觸有衣二明女來觸比丘相三俱衣三與人女粗語戒初戒名二戒緣三戒本初出犯人二明內染三出犯境四陳過相注文為二初釋語相五結罪二明八相四歎身向人女索欲供養戒初戒名二戒緣三戒本初是犯人二是欲意三過境四正明犯法五舉善法以勸初修梵行二持戒三修善法注文為六初舉頭陀明節儉法二舉唄匿明稱讚法三舉多聞明廣見法四舉說法明開智法五舉持律明奉行法六舉作禪明剋道法六結罪屬彼五媒人戒初戒名二戒緣三戒本初是犯人二正是業本三釋前成相四是其罪六無主不處分過量房戒初戒名二戒緣三戒本初立法十句初造人二乞求三作屋四無主五為己六應量七指授八與法注文為三初商度彼人堪可進否九無難二明與白二之相十無妨三明作成分齊二犯本十句初犯人二難三妨四自求五作屋六無主七自為八不乞處分九過量十結罪注文為二初犯初比丘初自作二尼二教他初教他同犯二不犯二為他不同初明為他輕重二對巧師有無七有主為己不處分造房戒初戒名二戒緣三戒本初立法八句同上除乞求及應量二犯本八句同上除自求及過量八無根波羅夷謗戒初戒名二戒緣三戒本初是犯人初列名二內有瞋心二顯相三出謗境三釋成無根四明無根五正重加謗前段注文為三六自言虛相七結罪注文為二初犯初比丘初明僧尼同犯相二不犯二尼二明三衆別犯相初明僧有成犯相二明尼同大僧相初以四重謗二以十三難三以諸篇謗九假根波羅夷謗戒初戒名二戒緣三戒本七句同上十破僧違諫戒初戒名二戒緣初出血緣二破僧緣三戒本初第一雙初拒諫人二諫所為事初明始心初出破正之道理二立邪三寶二明正法三行化於時三所破正人二第二雙初屏諫初牒過知非二勸同和相初舉喻示諫二拒屏諫二舉益示諫注文為二初自諫二求他諫初求近人三第三雙初僧諫二求遠人二拒僧諫四一隻即犯科十一助破僧違諫戒初戒名二戒緣初明調達執五法相二明伴黨比丘助破為緣三戒本初第一雙初總明正助破僧人注文為二初解正助二伴相二諫所為事初遮僧不聽諫詞二釋順從二出不聽之道理二第二雙初屏諫初領彼諫詞二拒屏諫二出勸捨道理初鄙賤行三第三雙初僧諫三明所以加諫恐僧異別二染汙行二拒僧諫四勸隨法衆無非法別三輕逸行四一隻即犯科十二汙家擯謗違諫戒初正所汙家之處二正顯過相第二段注文為二初總標初戒名二列示二戒緣初明汙家相第三段注文為三初明比丘入聚二明擯出相二明俗士見輕三明起謗緣三明白佛設擯四明制戒三戒本初第一雙初諫所諫人二諫所諫事初明依聚落造過二正明牒過治擯初牒過三明非理謗僧二加擯注文為二二第二雙初屏諫初牒其謗詞二拒屏諫二正明自理喻彼三第三雙初僧諫三重敘前過二拒僧諫初先令俗士知非得信四一隻即犯科注文為二初犯二次乃驅擯因之起謗二不犯初開殘罪二開汙家吉三開惡行吉十三惡性拒僧違諫戒初戒名二戒緣初過起所由二明訶制戒三戒本初第一雙初所諫人二諫所為事初明惡性二明彼犯三如法諫喻四正是拒諫五出拒勸之相六明不受道理二第二雙初屏諫初牒前拒詞二順理重誨二拒屏諫三第三雙初僧諫二拒僧諫四一隻即犯科三結章門初結前文二除疑執初除疑二治罰初治覆情過二治僧殘情過三治僧殘罪三將說下篇前更簡衆三二不定法初標章門二釋章門初屏處不定戒初戒名二戒緣三戒本初人二共三女人四獨五屏處等六明坐處七說非法語八明舉罪九明自言相十明罪處所治相二露處不定戒初戒名二戒緣三戒本一人二共三女人四露處五明坐處六說非法語七明舉罪八明自言相九明罪處所治相三結章門四三十尼薩耆波逸提法初標章門二釋章門初畜長衣過限戒初戒名二戒緣三戒本初犯人乃至三十回僧物戒二三衣具足竟三結章門三開緣謝四所防過境後段注文為二初犯初比丘初列八門明持犯相二餘衆二明除疑執二不犯三正治罪二離衣宿戒初戒名二戒緣三戒本一是犯人二受持竟三開緣謝四所犯戒境五人衣異隔注文為五初十界名初舉蘭界初明不失二例同十界二明失二十界體別初蘭界三體不相攝初舉蘭示相二樹界二例諸界三場界四明勢分義初舉蘭示相四車界六明得法離二例諸界五船界七捨五指罪相初明離相六村界八罪注文為二初犯初比丘二教其行護七堂界二尼三明違法八庫界二不犯初羯磨四結提重九倉界二奔護十阿蘭若界三奪想四隔礙五情染礙三月望衣過限戒初戒名二戒緣三戒本初犯人二三衣同體足竟三開緣謝四得非時衣五同長衣常開六重開一月七明違法八捨九罪四取非親尼衣戒初戒名二戒緣三戒本初犯人二非親尼注文為二初釋親三取衣二明籌度可否相四除貿易注文為二初引緣起五制捨二明佛開六結罪五使非親尼浣故衣戒初戒名二戒緣三戒本初人二非親三浣故衣四染打五捨六罪六從非親俗人乞衣戒初戒名二戒緣三戒本初犯人二非親俗士女三乞衣四開緣五捨六罪七重解前段注文為二初制裸形二教方便初取己物二借別人物三借僧物初明開取二明還僧法七過分取衣戒初戒名二戒緣三戒本八勸居士增衣價戒初戒名二戒緣初過起之由二不應之相三戒本九勸二家增衣價戒同上十過限急索衣戒初戒名二戒緣初明大臣所厚二明因索致罰三明訶制三戒本初犯人二明寶主緣由初財主遣使持寶將與比丘二明使人受寶付彼之相三過索成業三明懼犯畜寶不即受相四捨四明使問執事人五結罪五明示執事人所在六不得進否相六明與寶物付淨主相七既付寶